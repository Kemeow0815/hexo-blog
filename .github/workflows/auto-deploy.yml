name: auto deploy

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        name: auto deploy
        steps:
            # 1. 配置 SSH Key（用于拉取私有子模块）
            - name: Setup SSH for Submodules
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
              run: |
                  mkdir -p ~/.ssh
                  # 使用正确的方式写入 SSH key，处理换行符
                  echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  # 移除可能存在的错误 URL 重写配置
                  git config --global --remove-section url."git@github.com-kemeow0815:" || true
                  # 确保正确的 SSH 配置
                  git config --global url."git@github.com:".insteadOf "https://github.com:"

            # 2. 获取源码1
            - name: Checkout
              uses: actions/checkout@v3
              with:
                  submodules: recursive
                  token: ${{ secrets.GITHUB_TOKEN }}

            # 3. 安装 pnpm
            - name: Install pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            # 4. 配置 Node.js 环境
            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20"
                  cache: "pnpm"

            # 5. 安装依赖
            - name: Install Dependencies
              run: |
                  if [ -f "pnpm-lock.yaml" ]; then
                      pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
                  else
                      npm ci || npm install
                  fi

            # 6. 安装 Hexo CLI
            - name: Install Hexo CLI
              run: npm install -g hexo-cli

            # 7. 生成静态文件
            - name: Generate Public Files
              run: |
                  npm run build

            # 7. 部署到 GitHub 仓库
            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  deploy_key: ${{ secrets.DEPLOY_KEY }}
                  external_repository: Kemeow0815/blog
                  publish_branch: gh-pages
                  publish_dir: ./public
                  commit_message: ${{ github.event.head_commit.message }}
                  user_name: "github-actions[bot]"
                  user_email: "github-actions[bot]@users.noreply.github.com"
