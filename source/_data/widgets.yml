        <span>Follow Me 🛫</span>
      </a>
    </div>
    <style>
      .follow-me-widget {
        padding: 0.5rem 0;
      }
      .follow-me-widget #card-info-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 20px;
        background: #3498db;
        color: #fff;
        text-decoration: none;
        border-radius: 25px;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(52, 152, 从19, 0.4);
      }
      .follow-me-widget #card-info-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.6);
      }
      .follow-me-widget #card-info-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      .follow-me-widget #card-info-btn span {
        white-space: nowrap;
      }
      /* 深色模式适配 */
      [data-theme="dark"] .follow-me-widget #card-info-btn {
        background: #2980b9;
        box-shadow: 0 4px 15px rgba(41, 128, 185, 0.4);
      }
      [data-theme="dark"] .follow-me-widget #card-info-btn:hover {
        box-shadow: 0 6px 20px rgba(41, 128, 185, 0.6);
      }
      /* 移动端适配 */
      @media screen and (max-width: 768px) {
        .follow-me-widget #card-info-btn {
          padding: 10px 16px;
          font-size: 13px;
        }
        .follow-me-widget #card-info-btn i {
          font-size: 16px;
        }
      }
    </style>

