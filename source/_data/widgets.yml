toc:
  layout: toc
  list_number: false # 是否显示序号
  min_depth: 2 # 建议不要低于 2 即从 H2 标签开始解析（H1标签用于文章大标题）
  max_depth: 5 # 5 代表最多解析到 H5 标签
  fallback: recent # Use a backup widget when toc does not exist.
  collapse: false # true / false / auto (始终折叠/不折叠/自动折叠)
recent:
  layout: recent
  rss: # /atom.xml # npm i hexo-generator-feed
  limit: 5 # Count of posts
related:
  layout: related
linklist:
  layout: linklist
  columns: 1 
  items:
    - icon: '<svg...></svg>' # 或者 icons.yml 中设置的 icon 名称
      title: 关于
      url: /about/
welcome:
    layout: markdown
    title: '🎉 欢迎 '
    linklist:
      layout: linklist
      columns: 1 
      items:
        - icon: 'about' # 或者 icons.yml 中设置的 icon 名称
          title: 关于
          url: /about/
    content: |
        本站托管于 Github pages, 可能会出现加载缓慢或丢失问题，希望开着VPN访问。
        <br> 
        每日一言:  <span id="hitokoto-text"> </span>
        <small id="hitokoto-from" style="opacity: 0.7;"></small>
        <script>
        function fetchHitokoto() {
          fetch('https://v1.hitokoto.cn?c=d&c=h&c=j&c=a')
            .then(function(res) { return res.json(); })
            .then(function(data) {
              const textEl = document.getElementById('hitokoto-text');
              const fromEl = document.getElementById('hitokoto-from');
              if(data.hitokoto) {
                textEl.textContent = '「' + data.hitokoto + '」';
              }
              if(data.from || data.from_who) {
                data.from = data.from || '';
                data.from_who = data.from_who || '';
                fromEl.textContent = '—— ' + (data.from_who ? data.from_who + ' ' : '') + '《' + data.from + '》';
              }
            })
            .catch(function(err) {
              console.error('一言加载失败:', err);
            });
        }
        fetchHitokoto();
        </script>

  # src: # 可以设置外部 md 文件链接
tagcloud:
  layout: tagcloud
  title: 标签云
  # 标签云配置
  min_font: 12
  max_font: 24
  amount: 100
  orderby: name
  order: 1 # 1, sac 升序；-1, desc 降序
  color: false # 使用颜色
  start_color:  # 开始的颜色。您可使用十六进位值（'#b700ff'），rgba（rgba(183, 0, 255, 1)），hsla（hsla(283, 100%, 50%, 1)）或 颜色关键字。此变量仅在 color 参数开启时才有用。
  end_color:  # 结束的颜色。您可使用十六进位值（'#b700ff'），rgba（rgba(183, 0, 255, 1)），hsla（hsla(283, 100%, 50%, 1)）或 颜色关键字。此变量仅在 color 参数开启时才有用。
  show_count: false # 显示每个标签的文章总数
ghuser:
  layout: ghuser
  username: Kemeow0815 # your github login username
  avatar: true # show avatar or not
  menu: true # show menu or not
ghrepo:
  layout: ghrepo
timeline:
  layout: timeline
  title: 近期动态
  api: https://jsd.268682.xyz/gh/Kemeow0815/ghapi-json-generator@output/v2/repos/Kemeow0815/blog-timeline/issues%3F%3Fstate%3Dall%26labels%3D%E6%97%A5%E5%B8%B8%26per_page%3D20/data.json # 若你想限制数量，在api链接后面加上?per_page=1指限制为1条
  user: # 是否过滤只显示某个人发布的内容，如果要筛选多人，用英文逗号隔开
  hide: # title,footer # 隐藏标题或底部 # 此功能需要 Stellar v1.13.0

# 即刻短文 Moment 组件
moment:
  layout: moment
  title: 📝 即刻短文
  api: https://tgtalk.kemeow.top/ # 即刻短文数据 API
  limit: 5 # 显示数量限制

