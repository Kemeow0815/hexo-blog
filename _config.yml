# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 喵洛阁
avatar: https://jsd.268682.xyz/gh/Kemeow0815/img@main/img/kemeow0815.webp
favicon: /favicon.ico
subtitle: '每一段旅行，都有终点。| www.kemiaosw.top'
description: '克喵的博客，在这里记录我的生活日常、踩坑记录和资源分享。'
keywords: 克喵, blog
author: 克喵爱吃卤面
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://blog.kemiaosw.top/
permalink: posts/:abbrlink.html
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include: []
exclude: []
ignore: []

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: stellar

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/<username>/<project>
  # example, https://github.com/hexojs/hexojs.github.io
  branch: gh-pages

feed:
  type: atom          # 生成 atom.xml
  path: atom.xml      # 输出文件名
  limit: 20           # 最多显示文章数 (0=全部)
  hub:                # PubSubHubbub 中心 (可选)
  content: true       # 是否包含全文内容 (true=是, false=仅摘要)
  content_limit: 140  # 摘要长度（当 content=false 时生效）
  content_limit_delim: ' '  # 截断分隔符
  order_by: -date     # 按日期倒序排列
  autodiscovery: true # 在 HTML 头部添加自动发现标签

# abbrlink 配置
abbrlink:
  alg: crc32      #算法，支持 crc16(default)和 crc32
  rep: hex        #进制，支持 dec(default)和 hex
  drafts: false   #true：对草稿也进行处理，false：不处理草稿。默认为 false
  # 从目录树生成类别
  # depth: 您想生成的目录树的最大深度, 需要大于 0
  auto_category:
    enable: true  #默认为 true
    depth:        #默认为 3
    over_write: false
  auto_title: false #启用自动标题，它可以按路径自动填充标题
  auto_date: true #启用自动日期，可以按今天的时间自动填写日期
  force: false #启用 Force 模式，在这种模式下插件将忽略缓存，并为每一篇文章计算生成永久链接，即使它已经有了永久链接。这个设置只会更新永久链接，而不是更新其他前置变量。

# hexo-safego安全跳转插件
# see https://blog.liushen.fun/posts/1dfd1f41/
hexo_safego:
  # 基本功能设置
  general:
    enable: true                # 启用插件
    enable_base64_encode: true  # 使用 Base64 编码
    enable_target_blank: true   # 从新窗口打开跳转页面

  # 安全设置
  security:
    url_param_name: 'u'         # URL 参数名
    html_file_name: 'go.html'   # 重定向页面的文件名
    ignore_attrs:               # 忽略处理的 HTML 结构
      - 'data-fancybox'

  # 容器与页面设置
  scope:
    apply_containers:           # 应用的容器选择器
      - '#article-container'    # 文章容器
      - '.md-text'              # 文章内容
      - '.post-content'         # 文章内容（Stellar主题）
      - '.friends-container'    # 友链容器
      - '.sites-wrapper'        # 友链包装器
    apply_pages:                # 应用的页面路径
      - "/posts/"               # 文章页
      - "/friends/"             # 友链页
      - "/devices/"
    exclude_pages:              # 排除的页面路径
      - "/go.html"

  # 域名白名单
  whitelist:
    domain_whitelist:           # 允许的白名单域名，通过字符串匹配实现
      # 本站域名
      - "blog.kemiaosw.top"
      - "www.kemiaosw.top"
      - "localhost:4000"
      - "localhost"
      # 常用国内服务
      - "jsd.268682.xyz"        # 你的 jsDelivr 镜像
      - "jsdelivr.net"
      - "cdn.jsdelivr.net"
      - "gcore.jsdelivr.net"
      - "unpkg.com"
      - "cdnjs.cloudflare.com"
      - "kemeow0815.github.io"
      # 社交媒体
      - "github.com"
      - "github.io"
      - "bilibili.com"
      - "space.bilibili.com"
      - "weibo.com"
      # 常用工具
      - "baidu.com"
      - "google.com"
      - "bing.com"

  # 页面外观设置
  appearance:
    avatar: /avatar.ico    # 跳转页面头像路径
    title: "喵洛阁"            # 跳转页面标题
    subtitle: "安全中心"         # 跳转页面副标题
    darkmode: auto              # 是否启用深色模式
    countdowntime: 4            # 跳转页面倒计时秒数，如果设置为负数则为不自动跳转
    custom_css: /css/go.css     # 自定义 CSS，可填相对路径或绝对 CSS 地址；留空则不插入

  # 调试设置
  debug:
    enable: false               # 启用调试模式